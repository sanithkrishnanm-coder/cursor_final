<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link rel="stylesheet" href="assets/css/styles.css"></head>
<body>
<script src="assets/js/main.js"></script><script src="assets/js/api.js"></script>
<script>
mountLayout("Login", `
  <div class="card">
    <input id="login-email" placeholder="Email">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="muted" id="msg"></p>
    <p class="auth-links">New here? <a href="signup.html">Create account</a></p>
  </div>
`);

async function login() {
  const emailEl = document.getElementById("login-email");
  const passwordEl = document.getElementById("login-password");
  const msgEl = document.getElementById("msg");
  const res = await apiRequest("/auth/login", "POST", { email: emailEl.value, password: passwordEl.value });
  if (res.success) {
    localStorage.setItem("token", res.data.token);
    localStorage.setItem("user", JSON.stringify(res.data.user));
    location.href = "dashboard.html";
  } else {
    msgEl.textContent = res.message;
  }
}

</script>
</body></html>
