<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mentors</title><link rel="stylesheet" href="assets/css/styles.css"></head>
<body><script src="assets/js/main.js"></script><script src="assets/js/api.js"></script>
<script>
mountLayout("Mentor Listing", `<div id="list" class="grid"></div><p id="msg" class="muted"></p>`);
const listEl = document.getElementById("list");
const msgEl = document.getElementById("msg");
apiRequest("/mentors/").then(res => {
  if (res.success) {
    listEl.innerHTML = (res.data || []).map(m => `<div class="card"><h3>${m.name}</h3><p>${m.bio}</p><a href="mentor-detail.html?id=${m.id}"><button type="button">View Mentor</button></a></div>`).join("");
  } else {
    msgEl.textContent = res.message;
  }
});
</script></body></html>
